server:
  port: 8090
  forward-headers-strategy: native
  compression:
    enabled: true
  error:
    whitelabel:
      enabled: false
spring:
  output:
    ansi:
      enabled: detect
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:h2:file:///${halo.work-dir}/db/halo-next?MODE=MySQL&DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_R2DBC_USERNAME:admin}
    password: ${SPRING_R2DBC_PASSWORD:123456}
  sql:
    init:
      platform: ${SPRING_SQL_INIT_PLATFORM:h2}
  codec:
    max-in-memory-size: 10MB
  messages:
    basename: config.i18n.messages
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
  thymeleaf:
    reactive:
      maxChunkSize: 8KB
  cache:
    type: caffeine
    caffeine:
      spec: expireAfterAccess=1h, maximumSize=10000
  threads:
    virtual:
      enabled: true

halo:
  # 指定halo对外暴露的站点地址
  external-url: http://localhost:8090/
  work-dir: ${user.home}/.halo2
  attachment:
    resource-mappings:
      - pathPattern: /upload/**
        locations:
          - migrate-from-1.x
  security:
    password-reset-methods:
      - name: email
        href: /password-reset/email
        icon: /images/password-reset-methods/email.svg
  # FastGPT integration configuration
  fastgpt:
    enabled: false
    api-url: https://api.fastgpt.in
    api-key: # Set your FastGPT API key here
    default-chat-id: # Set default chat ID if needed
    connect-timeout: 30000
    read-timeout: 60000
    auto-publish: false
    default-category: # Default category for FastGPT generated posts
    default-tags: # Default tags for FastGPT generated posts (comma separated)
    max-content-length: 100000
    enable-content-filter: true

springdoc:
  api-docs:
    enabled: false
  writer-with-order-by-keys: true

logging:
  level:
    org.thymeleaf.TemplateEngine: OFF
  file:
    name: ${halo.work-dir}/logs/halo.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      total-size-cap: 1GB
      max-history: 0

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    heapdump:
      access: unrestricted
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: super-role
      probes:
        enabled: true
  info:
    java:
      enabled: true
    os:
      enabled: true

resilience4j.ratelimiter:
  configs:
    authentication:
      limitForPeriod: 3
      limitRefreshPeriod: 1m
      timeoutDuration: 0
    comment-creation:
      limitForPeriod: 10
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
    signup:
      limitForPeriod: 3
      limitRefreshPeriod: 1h
      timeoutDuration: 0s
    send-email-verification-code:
      limitForPeriod: 1
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
    verify-email:
      limitForPeriod: 3
      limitRefreshPeriod: 1h
      timeoutDuration: 0s
    send-password-reset-email:
      limitForPeriod: 10
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
    password-reset-verification:
      limitForPeriod: 10
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
