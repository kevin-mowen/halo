server:
  port: 8090
  forward-headers-strategy: native
  compression:
    enabled: true
  error:
    whitelabel:
      enabled: false
spring:
  output:
    ansi:
      enabled: detect
  sql:
    init:
      platform: ${SPRING_SQL_INIT_PLATFORM:postgresql}
      schema-locations: classpath:schema-${SPRING_SQL_INIT_PLATFORM:postgresql}.sql
      mode: ${SPRING_SQL_INIT_MODE:always}
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/halo}
    username: ${SPRING_R2DBC_USERNAME:postgres}
    password: ${SPRING_R2DBC_PASSWORD:fgwyhhy2008}
  codec:
    max-in-memory-size: 10MB
  messages:
    basename: config.i18n.messages
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 365d
  thymeleaf:
    reactive:
      maxChunkSize: 8KB
  cache:
    type: caffeine
    caffeine:
      spec: expireAfterAccess=1h, maximumSize=10000
  threads:
    virtual:
      enabled: true

halo:
  # 指定halo对外暴露的站点地址（支持环境变量配置）
  external-url: ${HALO_EXTERNAL_URL:http://localhost:8090/}
  work-dir: ${HALO_WORK_DIR:${user.home}/.halo2}
  attachment:
    resource-mappings:
      - pathPattern: /upload/**
        locations:
          - migrate-from-1.x
  security:
    password-reset-methods:
      - name: email
        href: /password-reset/email
        icon: /images/password-reset-methods/email.svg

springdoc:
  api-docs:
    enabled: false
  writer-with-order-by-keys: true

logging:
  level:
    org.thymeleaf.TemplateEngine: OFF
  file:
    name: ${halo.work-dir}/logs/halo.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      total-size-cap: 1GB
      max-history: 0

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      access: unrestricted
    heapdump:
      access: unrestricted
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: super-role
      probes:
        enabled: true
  info:
    java:
      enabled: true
    os:
      enabled: true

resilience4j.ratelimiter:
  configs:
    authentication:
      limitForPeriod: 3
      limitRefreshPeriod: 1m
      timeoutDuration: 0
    comment-creation:
      limitForPeriod: 10
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
    signup:
      limitForPeriod: 3
      limitRefreshPeriod: 1h
      timeoutDuration: 0s
    send-email-verification-code:
      limitForPeriod: 1
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
    verify-email:
      limitForPeriod: 3
      limitRefreshPeriod: 1h
      timeoutDuration: 0s
    send-password-reset-email:
      limitForPeriod: 10
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
    password-reset-verification:
      limitForPeriod: 10
      limitRefreshPeriod: 1m
      timeoutDuration: 0s
